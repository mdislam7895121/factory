name: CI/Proof Runner Gate (pull_request)

concurrency:
  group: ci-proof-runner-gate-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - main

jobs:
  proof-gate:
    name: CI/Proof Runner Gate (pull_request)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/factory_dev
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Determine docs-only change set
        id: changes
        run: |
          $base = "${{ github.event.pull_request.base.sha }}"
          $head = "${{ github.sha }}"
          git fetch --no-tags --depth=1 origin $base
          $changed = git diff --name-only $base $head
          $docsOnly = $true
          foreach ($file in $changed) {
            if ($file -notmatch '^(docs/|.*\.md$)$') {
              $docsOnly = $false
              break
            }
          }
          if ($docsOnly) {
            "docs_only=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            "docs_only=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Docs-only fast pass
        if: steps.changes.outputs.docs_only == 'true'
        run: |
          Write-Host "Docs-only change detected; skipping heavy proof gate steps."

      - name: Setup Node.js
        if: steps.changes.outputs.docs_only != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm
          cache-dependency-path: |
            api/package-lock.json
            web/package-lock.json

      - name: Install API deps
        if: steps.changes.outputs.docs_only != 'true'
        run: npm -C api ci

      - name: Install Web deps
        if: steps.changes.outputs.docs_only != 'true'
        run: npm -C web ci

      - name: Lint/Build API (if present)
        if: steps.changes.outputs.docs_only != 'true'
        run: |
          npm -C api run lint --if-present
          npm -C api run build --if-present

      - name: Lint/Build/Test Web (if present)
        if: steps.changes.outputs.docs_only != 'true'
        run: |
          npm -C web run lint --if-present
          npm -C web run build --if-present
          npm -C web test --if-present

      - name: Run proof-l2 (compose + smoke + report)
        if: steps.changes.outputs.docs_only != 'true'
        run: pwsh -File scripts/proof-l2.ps1 -DownWithVolumes -Ci

      - name: Upload proof artifacts
        if: always() && steps.changes.outputs.docs_only != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: proof-l2-${{ github.run_id }}
          path: proof/*
          if-no-files-found: warn
